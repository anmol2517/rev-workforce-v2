spring.application.name=revworkinghrm

# Server Configuration
server.port=8080
server.servlet.context-path=/rev

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revworkinghrm
spring.datasource.username=root
spring.datasource.password=Scar2511@#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=revworkforce_secret_key_for_jwt_token_generation_please_change_in_production_environment_32_char_min
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.revworkforce=DEBUG

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
